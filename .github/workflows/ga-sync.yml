name: GreenArrow Sync to D1

# Настраиваем триггеры (когда запускать скрипт)
on:
  # 1. Запуск по расписанию (Cron)
  # Сейчас стоит запуск каждый час в 00 минут. 
  # Если хочешь раз в 6 часов, поменяй на: "0 */6 * * *"
  schedule:
    - cron: "0 * * * *"
  
  # 2. Позволяет запускать скрипт вручную прямо из интерфейса GitHub (очень полезно для тестов!)
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
      # Шаг 1: Скачиваем код твоего репозитория на сервер GitHub
      - name: Checkout repository
        uses: actions/checkout@v4

      # Шаг 2: Устанавливаем современную версию Node.js (где уже есть встроенный fetch)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Шаг 3: Запускаем наш скрипт!
      - name: Run Sync Script
        run: node sync.js