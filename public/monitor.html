<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNDS Monitor | ivandeliver.email</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f7f9; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        h1 { color: #1a1a1a; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        .green { background: #e6fffa; color: #38a169; }
        .yellow { background: #fffaf0; color: #dd6b20; }
        .red { background: #fff5f5; color: #e53e3e; }
        canvas { max-height: 400px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>SNDS IP Reputation Dashboard</h1>
        
        <div class="card">
            <canvas id="sndsChart"></canvas>
        </div>

        <div class="card">
            <h3>Последние данные по IP</h3>
            <table id="ipTable">
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>IP Адрес</th>
                        <th>Статус</th>
                        <th>Жалобы</th>
                        <th>Ловушки</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'https://d1-template.skitalets-od.workers.dev/api/data';

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                renderTable(data);
                renderChart(data);
            } catch (err) {
                console.error('Ошибка загрузки данных:', err);
            }
        }

        function renderTable(data) {
            const tbody = document.querySelector('#ipTable tbody');
            tbody.innerHTML = data.slice(0, 20).map(row => `
                <tr>
                    <td>${row.date}</td>
                    <td>${row.ip}</td>
                    <td><span class="status-pill ${row.filter_result.toLowerCase()}">${row.filter_result}</span></td>
                    <td>${row.complaints}</td>
                    <td>${row.traps}</td>
                </tr>
            `).join('');
        }

        function renderChart(data) {
            // Группируем данные по датам для графика
            const labels = [...new Set(data.map(item => item.date))].reverse();
            const complaintsData = labels.map(date => {
                return data.filter(i => i.date === date).reduce((sum, curr) => sum + curr.complaints, 0);
            });

            new Chart(document.getElementById('sndsChart'), {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Complaints',
                        data: complaintsData,
                        borderColor: '#4299e1',
                        backgroundColor: 'rgba(66, 153, 225, 0.1)',
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: { responsive: true, plugins: { legend: { position: 'top' } } }
            });
        }

        fetchData();
    </script>
</body>
</html>
